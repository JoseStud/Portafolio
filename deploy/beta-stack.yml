version: "3.9"

services:
  app:
    # Static beta deployment served by nginx from the host-mounted site folder.
    image: nginx:1.27-alpine
    volumes:
      - /home/ubuntu/beta-site:/usr/share/nginx/html:ro
    networks:
      - traefik_proxy
    deploy:
      replicas: 1
      placement:
        # Pin beta to the worker expected to contain /home/ubuntu/beta-site.
        constraints:
          - node.hostname == app-worker-1
      update_config:
        # Start the replacement task before stopping the old one to avoid a
        # short outage during content or image updates.
        parallelism: 1
        order: start-first
      rollback_config:
        parallelism: 1
        order: stop-first
      labels:
        # Traefik routes beta.anxiden.dev to this nginx service over websecure.
        traefik.enable: "true"
        traefik.http.routers.alt-beta.entrypoints: websecure
        traefik.http.routers.alt-beta.rule: Host(`beta.anxiden.dev`)
        traefik.http.routers.alt-beta.tls: "true"
        traefik.http.routers.alt-beta.tls.certresolver: letsencrypt
        traefik.http.services.alt-beta.loadbalancer.server.port: "80"

networks:
  traefik_proxy:
    # Shared ingress network managed outside this stack.
    external: true
